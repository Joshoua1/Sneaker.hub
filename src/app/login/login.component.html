<header>
    <div class="company-name">Sneakers.hub</div>
    <nav>
        <ul class="nav-right">
            <li><a routerLink="/home">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</header>
<div class="container">
    <h2 class="center-align">Your Account for Everything Sneakers.hub</h2>
    <form action="#" method="get">
        <table>
            <tr>
                <td><label for="name">Username</label></td>
                <td><input type="text" id="name" name="username" required></td>
            </tr>
            <tr>
                <td><label for="password">Password</label></td>
                <td>
                    <div class="password-input">
                        <input type="password" id="password" name="password" required>
                        <img src="hide.png" id="password-toggle" class="password-toggle" alt="Hide Password">
                    </div>
                    <div class="password-validation-error" id="password-validation-error"></div>
                </td>
            </tr>
        </table>
        <br>
        <input type="submit" value="Log In">
        <br>
        <br>
        <a routerLink="/forgot-password">Forgot Password</a>
    </form>
</div>
<footer>
    <div class="social-media">
        <a href="#"><img src="facebook.png" alt="Facebook"></a>
        <a href="#"><img src="twitter.png" alt="Twitter"></a>
        <a href="#"><img src="instagram.png" alt="Instagram"></a>
    </div>
</footer>
